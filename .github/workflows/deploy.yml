name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 22
  PNPM_VERSION: 9

jobs:
  # ============================================================
  # 1. Lint & Type Check
  # ============================================================
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  # ============================================================
  # 2. Build Check
  # ============================================================
  build-check:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dmit/shared build
      - run: pnpm --filter @dmit/api build
      - run: pnpm --filter @dmit/web build

  # ============================================================
  # 3. API Tests
  # ============================================================
  test-api:
    runs-on: ubuntu-latest
    needs: build-check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dmit
          POSTGRES_PASSWORD: dmit_test
          POSTGRES_DB: dmit_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dmit/shared build
      - run: pnpm --filter @dmit/api test -- --run
        env:
          DATABASE_URL: postgres://dmit:dmit_test@localhost:5432/dmit_test
          JWT_SECRET: test-secret-min-32-chars-long-key
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars

  # ============================================================
  # 4. Web Tests
  # ============================================================
  test-web:
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dmit/web test -- --run

  # ============================================================
  # 5. Deploy to Production VPS (only on push to main)
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting deployment..."

            cd /opt/dmit-saas

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Install & build
            pnpm install --frozen-lockfile
            pnpm --filter @dmit/shared build

            # Rebuild Docker images
            cd docker
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build

            # Wait for DB
            sleep 5

            # Run migrations
            docker compose -f docker-compose.prod.yml exec -T api npx drizzle-kit migrate

            # Cleanup old images
            docker system prune -af --volumes=false

            echo "✅ Deployment complete!"

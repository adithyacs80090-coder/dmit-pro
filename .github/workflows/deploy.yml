name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 22
  PNPM_VERSION: 9

jobs:
  # ============================================================
  # 1. Lint & Type Check
  # ============================================================
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  # ============================================================
  # 2. Build Check
  # ============================================================
  build-check:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dmit/shared build
      - run: pnpm --filter @dmit/api build
      - run: pnpm --filter @dmit/web build

  # ============================================================
  # 3. API Tests
  # ============================================================
  test-api:
    runs-on: ubuntu-latest
    needs: build-check
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: dmit_root_test
          MYSQL_USER: dmit
          MYSQL_PASSWORD: dmit_test
          MYSQL_DATABASE: dmit_test
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -pdmit_root_test --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dmit/shared build
      - run: pnpm --filter @dmit/api run test
        env:
          DATABASE_URL: mysql://dmit:dmit_test@localhost:3306/dmit_test
          JWT_SECRET: test-secret-min-32-chars-long-key
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars

  # ============================================================
  # 4. Web Tests
  # ============================================================
  test-web:
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dmit/web run test

  # ============================================================
  # 5. Deploy to Production VPS (only on push to main)
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting deployment..."

            cd /opt/dmit-saas

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Install & build
            pnpm install --frozen-lockfile
            pnpm --filter @dmit/shared build

            # Rebuild Docker images
            cd docker
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build

            # Wait for DB
            sleep 5

            # Run migrations
            docker compose -f docker-compose.prod.yml exec -T api npx drizzle-kit migrate --config apps/api/drizzle.config.ts

            # Cleanup old images
            docker system prune -af --volumes=false

            echo "✅ Deployment complete!"

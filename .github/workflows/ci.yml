name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore:
      - main  # deploy.yml handles main branch

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @dmit/shared build
      - run: pnpm --filter @dmit/api build
      - run: pnpm --filter @dmit/web build

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dmit
          POSTGRES_PASSWORD: dmit_test
          POSTGRES_DB: dmit_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dmit/shared build
      - run: pnpm --filter @dmit/api test -- --run
        env:
          DATABASE_URL: postgres://dmit:dmit_test@localhost:5432/dmit_test
          JWT_SECRET: test-secret-min-32-chars-long-key
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dmit/web test -- --run

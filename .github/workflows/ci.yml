name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore:
      - main  # deploy.yml handles main branch

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @dmit/shared build
      - run: pnpm --filter @dmit/api build
      - run: pnpm --filter @dmit/web build

  test-api:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: dmit_root_test
          MYSQL_USER: dmit
          MYSQL_PASSWORD: dmit_test
          MYSQL_DATABASE: dmit_test
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -pdmit_root_test --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dmit/shared build
      - run: pnpm --filter @dmit/api run test
        env:
          DATABASE_URL: mysql://dmit:dmit_test@localhost:3306/dmit_test
          JWT_SECRET: test-secret-min-32-chars-long-key
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dmit/web run test

version: '3.8'

services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dmit_root_secret}
      MYSQL_USER: ${MYSQL_USER:-dmit}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dmit_secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dmit_pro}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dmit-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - dmit-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: mysql://${MYSQL_USER:-dmit}:${MYSQL_PASSWORD:-dmit_secret}@db:3306/${MYSQL_DATABASE:-dmit_pro}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@dmitpro.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://dmitpro.in}
      API_URL: ${API_URL:-https://api.dmitpro.in}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dmit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    networks:
      - dmit-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
    networks:
      - dmit-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  dmit-network:
    driver: bridge
